name: generate query client

on:
  workflow_dispatch:
  push:
    branches:
      - generate-query-client

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: npm ci
      run: npm ci

    - name: generate query client
      run: npm run generate-query-client
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: build
      run: npm run build

    - name: test
      run: npm test

    - name: detect changes
      id: changes
      run: |
        git add .
        if git diff --cached --quiet; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No changes detected. Skipping PR creation."
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git commit -m "Generate query client"
          git push
        fi

    - name: create or update pull request
      if: steps.changes.outputs.has_changes == 'true'
      uses: tomsdoo/actions/ensure-pull-request@8141f2e4003ff2d73b564aa12cb1669e823a48cf
      with:
        base-branch: main
        head-branch: generate-query-client
        title: Generate query client
        summary: generated query client files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
