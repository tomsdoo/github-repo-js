name: generate query client

on:
  workflow_dispatch:
  push:
    branches:
      - generate-query-client

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: npm ci
      run: npm ci

    - name: generate query client
      run: npm run generate-query-client
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: build
      run: npm run build

    - name: test
      run: npm test

    - name: detect changes
      id: changes
      run: |
        git add .
        if git diff --cached --quiet; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No changes detected. Skipping PR creation."
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: create or update pull request
      if: steps.changes.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: Generate query client
        title: Generate query client
        body: |
          This PR was created automatically because generated query client files changed.
        branch: generate-query-client
        base: ${{ github.event.repository.default_branch }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
